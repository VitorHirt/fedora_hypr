# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto
monitor=eDP-1,1920x1080@144, 0x0, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
$fileManager = nemo
$menu = ~/.config/rofi/launchers/type-1/menu.sh
#$menu = wofi --show drun

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = hyprpaper
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = $HOME/walls/wallpaperchange2.sh
exec-once = $HOME/awalls/anim-wallpaper-restore.sh
exec-once = swaync
exec-once = $HOME/walls/bluetooth.sh
#exec-once = $HOME/.config/alacritty/cavarun.sh


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,17
env = HYPRCURSOR_SIZE,17
env = XCURSOR_THEME,Capitaine-Cursors-Nord

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 7
    gaps_out = 20

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ffffffee) rgba(ffffffee) 45deg
    col.inactive_border = rgba(282828ee)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 0.8
    inactive_opacity = 0.7
shadow {

       enabled = false
       range = 10
       sharp = false

}


    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {

         enabled = true
        size = 1
        passes = 5
        ignore_opacity = true
        vibrancy = 0.5
        vibrancy_darkness = 0.3
        contrast = 1
        popups = false


    }

}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
        animation = windowsIn, 1, 8, default, slide bottom
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default


}


# Layer rules use the new match:namespace syntax since Hyprland 0.53+
layerrule = animation slide top, match:namespace rofi

layerrule = animation popin 50%, match:namespace waybar

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
gesture = 3, horizontal, workspace, scale: 1.5


}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = , F2, exec, $terminal
bind = , F7, exec, $HOME/walls/wallpaper-picker.py
bind = , F8, exec, $HOME/.config/waybar/2ndbar.sh
bind = , F9, exec, $HOME/awalls/anim-wallpaper-picker.py
bind = , F11, exec, ~/.config/rofi/blurwall.sh
bind = , F5, exec, ~/.config/rofi/launcher.sh
bind = , F6, exec, ~/.config/rofi/power.sh
bind = , F1, killactive,
bind = $mainMod, M, exit,
bind = , F3, exec, $fileManager
bind = , F10, togglefloating
bind = , F10, resizeactive, exact 50% 50%
bind = , F10, centerwindow
bind = , TAB, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = , F4, exec, ~/.config/rofi/switcher.sh
bind = ALT, space, exec, ~/.config/rofi/launchers/type-4/menu.sh
#bind = , escape, exec, ~/.config/hypr/killrofi.sh
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, L, exec, swaylock

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1

bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 0, exec, grim
bind = $mainMod, 9, exec, alacritty -e cava
# App launchers
bind = $mainMod, D, exec, /opt/docker-desktop/bin/docker-desktop
bind = $mainMod, C, exec, flatpak run com.visualstudio.code
bind = $mainMod, G, exec, google-chrome-stable
bind = $mainMod, N, exec, gtk-launch Navicat.Premium.17
bind = $mainMod, T, exec, alacritty
bind = $mainMod, E, exec, $fileManager
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1


# Example windowrule v2


# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:fullscreen 0

#windowrulev2 = size 50% 50%, class:.*
#windowrulev2 = float, class:.*


#windowrule = float, class:Alacritty, title:Alacritty

#windowrule = float, class:org.mozilla.firefox, title:Mozilla Firefox

#windowrulev2 = size 1230 875, class:(org.mozilla.firefox)


windowrule = float on, match:class blueman-manager, match:title Bluetooth Devices

windowrule = size 700 700, match:class blueman-manager

windowrule = float on, match:class Alacritty, match:title btmWindow

windowrule = size 1000 900, match:title btmWindow

windowrule = float on, match:class org.pulseaudio.pavucontrol, match:title Volume Control

windowrule = size 800 700, match:title Volume Control


windowrule = float on, match:class Alacritty, match:title nmtuiWindow


windowrule = size 800 700, match:title nmtuiWindow

#windowrule = maximize, class:org.mozilla.firefox

#windowrule = workspace +1, class:org.mozilla.firefox


windowrule = float on, match:class Alacritty, match:title CavaWindow

windowrule = size 400 200, match:title CavaWindow

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 1, match:namespace waybar

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 1, match:namespace rofi


windowrule = float on, match:class wallpaper-picker.py, match:title Wallpaper Picker

windowrule = size 1570 310, match:title Wallpaper Picker

windowrule = move 180 60, match:title Wallpaper Picker

windowrule = animation slide top, match:title Wallpaper Picker

windowrule = rounding 50, match:title Wallpaper Picker


windowrule = float on, match:class anim-wallpaper-picker.py, match:title Animated Wallpapers
windowrule = size 1570 310, match:title Animated Wallpapers
windowrule = move 180 60, match:title Animated Wallpapers
windowrule = animation slide top, match:title Animated Wallpapers
windowrule = rounding 50, match:title Animated Wallpapers
